name: Release Workflow

on:
  push:
    tags:
      - "*"

jobs:
  release-to-pypi:
    environment: release-approval
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    if: github.repository == 'opensearch-project/genai-observability-sdk-py'
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.10"

      - name: Build and validate
        run: |
          python -m pip install --upgrade pip build
          pip install -e ".[dev]"
          pytest tests/ -v

          VERSION=`cat pyproject.toml | grep "^version =" | grep -Eo "[0-9.]+"`
          TAG_VERSION="${GITHUB_REF#refs/tags/}"
          if [ "$TAG_VERSION" != "$VERSION" ]; then
            echo "Version mismatch: tag=$TAG_VERSION, pyproject.toml=$VERSION"
            exit 1
          fi

          python -m build
          pip install dist/*.whl
          python -c "import opensearch_genai_observability_sdk_py; print('Package imports successfully')"

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1

      - name: Release on Github
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          draft: false
          generate_release_notes: true
