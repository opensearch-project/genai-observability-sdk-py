name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    name: Build and Validate
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"

    - name: Run tests
      run: pytest tests/ -v

    - name: Check version consistency
      run: |
        VERSION="${GITHUB_REF#refs/tags/v}"
        PYPROJECT_VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])")
        if [ "$VERSION" != "$PYPROJECT_VERSION" ]; then
          echo "❌ Version mismatch: tag=$VERSION, pyproject.toml=$PYPROJECT_VERSION"
          exit 1
        fi
        echo "✅ Version consistency check passed: $VERSION"

    - name: Install build tools
      run: |
        python -m pip install --upgrade build twine

    - name: Build package
      run: python -m build

    - name: Verify package
      run: |
        twine check dist/*
        pip install dist/*.whl
        python -c "import opensearch_genai_observability_sdk_py; print('Package imports successfully')"

    - name: Get approvers from CODEOWNERS
      id: get_approvers
      run: |
        echo "approvers=$(cat .github/CODEOWNERS | grep @ | tr -d '* ' | sed 's/@/,/g' | sed 's/,//1')" >> $GITHUB_OUTPUT

    - name: Request release approval
      uses: trstringer/manual-approval@v1
      with:
        secret: ${{ github.TOKEN }}
        approvers: ${{ steps.get_approvers.outputs.approvers }}
        minimum-approvals: 1
        issue-title: "Release ${{ github.ref_name }}"
        issue-body: |
          Please approve or deny the release of opensearch-genai-observability-sdk-py.

          **Tag**: ${{ github.ref_name }}
          **Commit**: ${{ github.sha }}

          Approve by commenting `approved` on this issue.
          Deny by commenting `denied` on this issue.
        exclude-workflow-initiator-as-approver: false

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: release-dists
        path: dist/

  pypi-publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: write

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Download build artifacts
      uses: actions/download-artifact@v8
      with:
        name: release-dists
        path: dist/

    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        generate_release_notes: true
        prerelease: ${{ contains(github.ref_name, 'rc') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') }}
